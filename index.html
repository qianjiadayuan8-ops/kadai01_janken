<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>心理戦じゃんけん</title>
</head>
<body>

<div class="desk">

  <!-- タイトル -->
  <div class="title">
    <p class="title-sub">心理戦</p>
    <h1 class="title-main">じゃんけん</h1>
  </div>

  <!-- 相手カード -->
  <div class="opponent">
    <p class="opponent-text">相手のカード</p>
  </div>

  <!-- ボタン -->
  <div class="player">

    <button class="curd gu" data-hand="✊">
      <span class="hand">✊</span>
      <span class="hand-name">グー</span>
    </button>

    <button class="curd choki" data-hand="✌️">
      <span class="hand">✌️</span>
      <span class="hand-name">チョキ</span>
    </button>

    <button class="curd pa" data-hand="🖐️">
      <span class="hand">🖐️</span>
      <span class="hand-name">パー</span>
    </button>

  </div>

  <!-- メッセージ -->
  <div class="comment">
    <p class="text">CPU「私は ✊ を出します」</p>
  </div>

</div>

<!-- js -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
